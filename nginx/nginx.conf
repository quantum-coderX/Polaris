events {
    worker_connections 1024;
}

http {
    # ── Upstream service definitions ──────────────────────────────────────────
    upstream auth_service {
        server auth-service:8001;
    }

    upstream payment_service {
        server payment-service:8003;
    }

    upstream notif_service {
        server notif-service:8002;
    }

    upstream core_service {
        server core-service:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Increase body size for file uploads / Stripe webhooks
        client_max_body_size 50M;

        # ── WebSocket upgrade map ─────────────────────────────────────────────
        # Required for /api/v1/notifications/ws and /api/v1/qa/ws/*
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # keep WS connections alive

        # ── Auth Service ──────────────────────────────────────────────────────
        # Routes: /api/v1/auth/* and /api/v1/users/*
        location ~ ^/api/v1/(auth|users)(/|$) {
            proxy_pass http://auth_service;
        }

        # ── Payment Service ───────────────────────────────────────────────────
        # Routes: /api/v1/payments/*
        location /api/v1/payments/ {
            proxy_pass http://payment_service;
        }

        # ── Notification Service ──────────────────────────────────────────────
        # Routes: /api/v1/notifications/* (HTTP + WebSocket)
        # Note: /internal/notify is NOT exposed here (internal Docker network only)
        location /api/v1/notifications/ {
            proxy_pass http://notif_service;
        }

        # ── Core Service ──────────────────────────────────────────────────────
        # Routes: everything else under /api/v1/*
        # (courses, lessons, enrollments, reviews, qa, search, admin, quizzes, certs)
        location /api/v1/ {
            proxy_pass http://core_service;
        }

        # ── Frontend ──────────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
        }
    }
}
